<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyUi + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css stylesheet -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="font-geist bg-base-200">
    <section class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-lg shadow-sm py-5">
            <div class="logo text-center space-y-5 py-3">
                <img class="mx-auto w-16 md:w-auto" src="./assets/github-logo.png" alt="">
                <div>
                    <h2 class="font-semibold text-lg md:text-2xl">GitHub Issues Tracker</h2>
                    <p class="opacity-70 text-sm md:text-base">Sign in to manage your issues</p>
                </div>
            </div>

            <div class="login-form">
                <fieldset class="fieldset rounded-box w-[80%] p-4 mx-auto">

                    <label class="label text-black font-medium">Username</label>
                    <input id="username" required type="email" class="input w-full focus:outline-none focus:ring-2 focus:ring-[#4A00FF] focus:border-[#4A00FF]" placeholder="Enter Username" />
                    <p class="text-[#4A00FF] mb-3">Default: admin</p>

                    <label class="label text-black font-medium">Password</label>
                    <input id="password" required type="password" class="input w-full focus:outline-none focus:ring-2 focus:ring-[#4A00FF] focus:border-[#4A00FF]" placeholder="Enter Password" />
                    <p class="text-[#4A00FF]">Password: admin123</p>

                    <button id="btn-signIn" class="btn btn-primary mt-4">Sign In</button>
                </fieldset>
            </div>

            <div class="or-section">
                <div class="flex items-center gap-3 w-[80%] mx-auto">
                    <hr class="flex-1 opacity-30">
                    <span class="text-sm font-medium">OR</span>
                    <hr class="flex-1 opacity-30">
                </div>
            </div>

            <div class="default-credentials text-center py-4 space-y-5">
                <p class="opacity-70">Demo Credentials:</p>
                <div class="div">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>

    <script src="./script/script.js"></script>
</body>

</html>
