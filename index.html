    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyUi + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

<body class="font-geist bg-base-200">
    <header class="shadow-sm w-full">
        <nav class="flex items-center justify-between md:w-11/12 md:mx-auto p-2 md:p-5">
            <div class="logo flex items-center justify-center gap-2">
                <img class="w-7 md:w-10" src="./assets/github-logo.png" alt="">
                <h1 class="font-semibold text-xs md:text-2xl">GitHub Issues Tracker</h1>
            </div>

            <div class="search-area flex items-center gap-2 w-[65%] md:w-auto">
                <label class="input focus-within:outline-purple-700">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>
                <!-- <button class="btn" onclick="issue_modal.showModal()">open modal</button> -->
                <button class="btn btn-primary">Search</button>
            </div>
        </nav>
    </header>

    <main class="mt-10 mx-auto w-11/12 bg-white p-5 rounded-lg">
        <section class="sticky top-0 z-10">
            <div
                class="flex justify-center md:justify-start md:items-end gap-3 toggle-area p-6 bg-white rounded-lg border border-gray-500/10">
                <div id="all-btn" class="btn btn-primary md:px-10 btn-toggle">All</div>
                <div id="open-btn" class="btn md:px-10 btn-toggle">Open</div>
                <div id="closed-btn" class="btn md:px-10 btn-toggle">Closed</div>
            </div>
        </section>

        <section id="issues-area">
            <div
                class="issue-head flex flex-wrap gap-4 items-center justify-between border border-gray-500/10 mt-5 p-5 rounded-lg">
                <div class="issue-logo flex items-center justify-between gap-4">
                    <div
                        class="w-8 h-8 md:w-12 md:h-12 rounded-full bg-purple-100 p-2 flex justify-center items-center">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="issue-details">
                        <h1 class="font-semibold text-sm md:text-2xl">
                            <span id="issue-count">0</span> Issues
                        </h1>
                        <p class="text-xs">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="issue-status">
                    <ul class="flex gap-6">
                        <li class="inline-flex items-center gap-2"><span
                                class="inline-block w-2 h-2 md:w-3 md:h-3 rounded-full bg-green-500"></span><span
                                class="md:text-lg text-xs">Open</span></li>
                        <li class="inline-flex items-center gap-2"><span
                                class="inline-block w-2 h-2 md:w-3 md:h-3 rounded-full bg-purple-500"></span><span
                                class="md:text-lg text-xs">Closed</span></li>
                    </ul>
                </div>
            </div>
        </section>
